syntax = "proto3";

package relay.v1;

option go_package = "relay/internal/proto/relayv1";

service AgentService {
  rpc Connect(stream AgentMessage) returns (stream CoordinatorMessage);
}

message AgentMessage {
  oneof payload {
    RegisterRequest          register             = 1;
    TaskStatusUpdate         task_status          = 2;
    TaskLogChunk             task_log             = 3;
    WorkspaceInventoryUpdate workspace_inventory  = 4;
  }
}

// Sent once when the stream opens. worker_id is empty on first registration.
// running_tasks is the agent's list of currently-executing tasks at reconnect
// time (empty on first connect). The coordinator diffs against DB state and
// replies with RegisterResponse.cancel_task_ids for any stale assignments.
//
// Exactly one credential field must be set. enrollment_token is used only on
// first boot of a fresh agent; every subsequent reconnect sends agent_token.
message RegisterRequest {
  string worker_id                 = 1;
  string hostname                  = 2;
  int32  cpu_cores                 = 3;
  int32  ram_gb                    = 4;
  int32  gpu_count                 = 5;
  string gpu_model                 = 6;
  string os                        = 7;
  repeated RunningTask running_tasks = 8;
  oneof credential {
    string enrollment_token = 9;
    string agent_token      = 10;
  }
  repeated WorkspaceInventoryUpdate inventory = 11;
}

// A task the agent believes it is currently running, with the epoch assigned
// at dispatch time. The coordinator uses this to detect stale assignments.
message RunningTask {
  string task_id = 1;
  int64  epoch   = 2;
}

message TaskStatusUpdate {
  string         task_id       = 1;
  TaskStatus     status        = 2;
  optional int32 exit_code     = 3;
  string         error_message = 4;
  int64          epoch         = 5;
}

message TaskLogChunk {
  string    task_id    = 1;
  LogStream stream     = 2;
  bytes     content    = 3;
  int64     epoch      = 4;
  int32     step_index = 5; // 1-indexed step number; 0 = not part of a numbered step (e.g. PREPARE chunks)
  int32     step_total = 6; // total step count for the task; 0 when step_index == 0
}

message CoordinatorMessage {
  oneof payload {
    RegisterResponse     register_response = 1;
    DispatchTask         dispatch_task     = 2;
    CancelTask           cancel_task       = 3;
    EvictWorkspaceCommand evict_workspace  = 4;
  }
}

// Sent in response to RegisterRequest. agent_token is populated only on
// successful enrollment (first connect with a valid enrollment_token); the
// agent must persist it and send it as agent_token on every reconnect.
// cancel_task_ids lists tasks the agent reported as running that the
// coordinator considers stale.
message RegisterResponse {
  string          worker_id       = 1;
  repeated string cancel_task_ids = 2;
  string          agent_token     = 3;
}

message DispatchTask {
  string              task_id         = 1;
  string              job_id          = 2;
  reserved 3;
  reserved "command";
  map<string, string> env             = 4;
  int32               timeout_seconds = 5;
  int64               epoch           = 6;
  SourceSpec          source          = 7;
  repeated CommandLine commands       = 8;
}

// CommandLine carries a single argv (executable + args). A task runs each
// CommandLine in `DispatchTask.commands` sequentially in the same workspace
// and environment; first non-zero exit fails the task.
message CommandLine {
  repeated string argv = 1;
}

message CancelTask {
  string task_id = 1;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED    = 0;
  TASK_STATUS_RUNNING        = 1;
  TASK_STATUS_DONE           = 2;
  TASK_STATUS_FAILED         = 3;
  TASK_STATUS_TIMED_OUT      = 4;
  TASK_STATUS_PREPARING      = 5;
  TASK_STATUS_PREPARE_FAILED = 6;
}

enum LogStream {
  LOG_STREAM_UNSPECIFIED = 0;
  LOG_STREAM_STDOUT      = 1;
  LOG_STREAM_STDERR      = 2;
  LOG_STREAM_PREPARE     = 3;
}

message SourceSpec {
  oneof provider {
    PerforceSource perforce = 1;
  }
}

message PerforceSource {
  string             stream              = 1;
  repeated SyncEntry sync                = 2;
  repeated int64     unshelves           = 3;
  bool               workspace_exclusive = 4;
  optional string    client_template     = 5;
}

message SyncEntry {
  string path = 1;
  string rev  = 2;
}

message WorkspaceInventoryUpdate {
  string source_type   = 1;
  string source_key    = 2;
  string short_id      = 3;
  string baseline_hash = 4;
  bool   deleted       = 5;
  string last_used_at  = 6;
}

message EvictWorkspaceCommand {
  string source_type = 1;
  string short_id    = 2;
}
