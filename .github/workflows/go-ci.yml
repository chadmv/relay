name: go-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: race + integration-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Integration-tagged build check
        run: make vet-integration
      - name: Race unit tests
        run: make test-race
